<h2>{{ title }}</h2>

@if (wishlist.length > 0) {
  <div class="wishlist-banner">
    <span class="heart">❤️</span>
    My Wishlist:

    @for (course of wishlist; track course.id) {
      <span class="wishlist-item">{{course.title}}</span>
    }

  </div>
}

@for (course of courses; track course.id) {
  <app-course-card [course]="course" (courseBooked)="onCourseBooked($event)" (wishlistAdded)="onWishlistAdded($event)"></app-course-card>
}
